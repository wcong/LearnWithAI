<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="40" fill="#0a192f"/>
  <!-- 声纳波纹：探索的隐喻 -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#172a45" stroke-width="1"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="#1d3b5c" stroke-width="1"/>
  <circle cx="100" cy="100" r="45" fill="none" stroke="#28547a" stroke-width="1.5"/>
  <!-- 探索线（声纳扫描线） -->
  <line x1="100" y1="100" x2="175" y2="55" stroke="#64ffda" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 知识发现点 -->
  <circle cx="140" cy="73" r="5" fill="#ffd700"/>
  <circle cx="140" cy="73" r="10" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
  <!-- 中心知识之光 -->
  <circle cx="100" cy="100" r="15" fill="#ffd700" opacity="0.9"/>
  <circle cx="100" cy="100" r="7" fill="#fff"/>
</svg>