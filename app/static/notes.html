<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习笔记 – 探知</title>
    <!-- Quill.js 富文本编辑器 -->
    <link href="/static/css/lib/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/notes.css">
    <link rel="stylesheet" href="/static/css/nav.css">
</head>
<body>

<!-- ====== 登录页 ====== -->
<div class="auth-page" id="authPage">
    <div class="auth-card">
        <div class="auth-logo"><img src="/static/images/logo_180.png" class="auth-logo-img" alt="探知"></div>
        <h1>探知</h1>
        <p class="auth-sub">学习笔记</p>
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin">登录</button>
            <button class="auth-tab" id="tabRegister">注册</button>
        </div>
        <!-- 登录/注册表单 -->
        <form id="authForm" onsubmit="return false;">
            <label>邮箱</label>
            <input type="email" id="authEmail" placeholder="输入邮箱" required autocomplete="email">
            <label>密码</label>
            <input type="password" id="authPassword" placeholder="输入密码" required autocomplete="current-password">
            <div id="authRegisterFields" style="display:none;">
                <div id="authRegStep1">
                    <button type="submit" formnovalidate class="auth-btn" id="authRegSendBtn" style="margin-bottom:10px;">发送验证码</button>
                </div>
                <div id="authRegStep2" style="display:none;">
                    <label>验证码</label>
                    <input type="text" id="authRegCode" placeholder="6 位数字验证码" maxlength="6">
                    <label>密码</label>
                    <input type="password" id="authRegPassword" placeholder="至少 4 个字符">
                    <label>确认密码</label>
                    <input type="password" id="authConfirmPassword" placeholder="再次输入密码">
                    <label>昵称（选填）</label>
                    <input type="text" id="authNickname" placeholder="显示名称">
                </div>
            </div>
            <p class="auth-error" id="authError"></p>
            <button type="submit" class="auth-btn" id="authBtn">登录</button>
            <p class="auth-forgot-link" id="authForgotLink" style="margin-top:10px;text-align:center;font-size:12px;color:#909399;cursor:pointer;">忘记密码？</p>
        </form>
        <!-- 忘记密码面板 -->
        <div id="authForgotPanel" style="display:none;">
            <p style="text-align:center;font-size:14px;color:#606266;margin-bottom:16px;">重置密码</p>
            <div id="authForgotStep1">
                <label>邮箱</label>
                <input type="email" id="authForgotEmail" placeholder="输入注册邮箱">
                <p class="auth-error" id="authForgotError"></p>
                <button type="button" class="auth-btn" id="authForgotSendBtn">发送验证码</button>
            </div>
            <div id="authForgotStep2" style="display:none;">
                <label>验证码</label>
                <input type="text" id="authForgotCode" placeholder="6 位数字验证码" maxlength="6">
                <label>新密码</label>
                <input type="password" id="authForgotNewPassword" placeholder="至少 4 个字符">
                <p class="auth-error" id="authForgotResetError"></p>
                <button type="button" class="auth-btn" id="authForgotResetBtn">重置密码</button>
            </div>
            <p class="auth-forgot-link" id="authForgotBack" style="margin-top:10px;text-align:center;font-size:12px;color:#409eff;cursor:pointer;">← 返回登录</p>
        </div>
    </div>
</div>

<!-- ====== 主页面（两栏） ====== -->
<div class="app-page" id="appPage" style="display:none;">
    <!-- 顶部导航 -->
    <header class="page-header">
        <div class="header-left">
            <span class="header-logo"><img src="/static/images/logo_180.png" class="header-logo-img" alt="探知"> 探知</span>
        </div>
        <nav class="header-nav">
            <a href="/domain" class="nav-link" data-page="domain">📚 <span class="nav-icon-text">学习领域</span></a>
            <a href="/notes" class="nav-link active" data-page="notes">📝 <span class="nav-icon-text">学习笔记</span></a>
            <a href="/static/skills.html" class="nav-link" data-page="skills">⚙️ <span class="nav-icon-text">技能管理</span></a>
            <a href="/plan" class="nav-link" data-page="plan">💡 <span class="nav-icon-text">学习计划</span><span class="nav-badge">实验</span></a>
        </nav>
        <div class="header-right">
            <span class="user-badge" id="userBadge"></span>
            <button class="logout-btn" id="logoutBtn" title="退出登录">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>退出</span>
            </button>
        </div>
    </header>

    <!-- 主体 -->
    <div class="page-body">
        <!-- 左栏：领域树 -->
        <aside class="notes-tree-panel">
            <div class="notes-tree-header">
                <div class="notes-tree-title">📚 学习领域</div>
                <button class="btn-create-area" id="btnNewRootArea" title="新建领域">➕</button>
            </div>
            <div class="notes-tree" id="areaTree">
                <div class="loading-text">加载中...</div>
            </div>
        </aside>

        <!-- 右栏：笔记编辑器 -->
        <main class="notes-content-panel">
            <div class="notes-content-header">
                <div>
                    <div class="notes-area-title" id="noteTitle">📝 学习笔记</div>
                    <div class="notes-area-sub" id="noteAreaName"></div>
                </div>
                <div class="notes-header-actions">
                    <span class="note-status" id="noteStatus"></span>
                    <button class="note-btn" id="btnEditNote" style="display:none;">✏️ 编辑</button>
                    <button class="note-btn note-btn-primary" id="btnSaveNote" style="display:none;">💾 保存</button>
                </div>
            </div>
            <div class="notes-editor-area">
                <div class="note-view" id="noteView"></div>
                <div class="note-editor" id="noteEditor" style="display:none;"></div>
            </div>
        </main>
    </div>
</div>

<!-- ====== 编辑领域模态框 ====== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h2 id="modalTitle">创建学习领域</h2>
        <div id="modalForm"></div>
    </div>
</div>

<!-- 本地库 -->
<script src="/static/js/lib/quill.js"></script>
<script src="/static/js/lib/marked.min.js"></script>
<script src="/static/js/notes.js"></script>
</body>
</html>
