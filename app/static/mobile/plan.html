<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>Plan Mode – 深度学习规划</title>
    <link rel="stylesheet" href="/static/mobile/css/style.css">
</head>
<body class="m-plan-page">

<!-- ====== 顶部导航栏（2 行布局） ====== -->
<header class="m-plan-header" id="mPlanHeader">
    <!-- Row 1: 页面导航 -->
    <div class="m-plan-nav-row">
        <a href="/static/mobile/home.html" class="m-plan-nav-logo" title="主页"><img src="/static/images/logo_180.png" class="m-plan-nav-logo-img" alt="探知"></a>
        <nav class="m-plan-page-nav">
            <a href="/static/mobile/index.html" class="m-plan-page-link" data-page="domain" title="学习领域">📚</a>
            <a href="/static/mobile/notes.html" class="m-plan-page-link" data-page="notes" title="学习笔记">📝</a>
            <a href="/static/mobile/plan.html" class="m-plan-page-link active" data-page="plan" title="学习计划">💡</a>
            <a href="/static/skills.html" class="m-plan-page-link" data-page="skills" title="技能管理">⚙️</a>
        </nav>
        <a href="/plan" class="m-plan-nav-desktop" title="桌面版">🖥️</a>
    </div>
    <!-- Row 2: 当前页操作 -->
    <div class="m-plan-action-row">
        <span class="m-plan-action-user" id="mPlanUserBadge" style="display:none;"></span>
        <div class="m-plan-action-group">
            <button class="m-plan-logout-btn" id="mPLogoutBtn" title="退出">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </div>
</header>

<!-- ====== 主容器 ====== -->
<div class="m-plan-container" id="mPlanContainer">

    <!-- ====== 输入区 ====== -->
    <div class="m-plan-input-section" id="mPlanInputSection">
        <div class="m-plan-input-card">
            <h1 class="m-plan-input-title">开始你的深度学习规划</h1>
            <p class="m-plan-input-subtitle">输入领域名称，AI 将自动递归探索并生成完整学习路径</p>
            <div class="m-plan-input-row">
                <input type="text" class="m-plan-input" id="mPlanDomainInput"
                       placeholder="例如：量子计算、CRISPR基因编辑..."
                       autofocus>
                <button class="m-plan-start-btn" id="mPlanStartBtn">开始探索</button>
            </div>
            <div class="m-plan-depth-row">
                <label class="m-plan-depth-label">🔬 探索层级</label>
                <div class="m-plan-depth-pills" id="mPlanDepthPills">
                    <button type="button" class="m-plan-depth-pill" data-value="1">1</button>
                    <button type="button" class="m-plan-depth-pill active" data-value="2">2</button>
                    <button type="button" class="m-plan-depth-pill" data-value="3">3</button>
                    <button type="button" class="m-plan-depth-pill" data-value="5">5</button>
                    <button type="button" class="m-plan-depth-pill" data-value="10">10</button>
                </div>
                <input type="hidden" id="mPlanDepthInput" value="2">
                <span class="m-plan-depth-hint" id="mPlanDepthHint">浅层概览</span>
            </div>
            <div class="m-plan-input-hints">
                <span>热门：</span>
                <button class="m-plan-hint-btn" data-domain="Transformer 架构优化">Transformer</button>
                <button class="m-plan-hint-btn" data-domain="CRISPR 基因编辑技术">CRISPR</button>
                <button class="m-plan-hint-btn" data-domain="强化学习在机器人控制中的应用">强化学习</button>
                <button class="m-plan-hint-btn" data-domain="固态电池电解质材料">固态电池</button>
            </div>
        </div>
    </div>

    <!-- ====== 探索视图 ====== -->
    <div class="m-plan-explore-view" id="mPlanExploreView" style="display:none;">

        <!-- 状态栏 -->
        <div class="m-plan-status-bar" id="mPlanStatusBar">
            <div class="m-plan-status-item">
                <span class="m-plan-status-label">当前深度</span>
                <span class="m-plan-status-value" id="mStatusDepth">0 / 10</span>
            </div>
            <div class="m-plan-status-item">
                <span class="m-plan-status-label">已探索</span>
                <span class="m-plan-status-value" id="mStatusAreas">0</span>
            </div>
            <div class="m-plan-status-item">
                <span class="m-plan-status-label">消息</span>
                <span class="m-plan-status-value" id="mStatusMessages">0</span>
            </div>
            <div class="m-plan-status-item">
                <span class="m-plan-status-label">状态</span>
                <span class="m-plan-status-value" id="mStatusText">
                    <span class="m-plan-status-dot pulse"></span> 准备中...
                </span>
            </div>
        </div>

        <!-- 树形视图 + 消息流（左右分栏） -->
        <div class="m-plan-content-split" id="mPlanContentSplit">
            <!-- 树形视图（左） -->
            <div class="m-plan-content-panel" id="mPlanTreePanel">
                <div class="m-plan-content-header">📂 领域树</div>
                <div class="m-plan-tree-body" id="mPlanTreeBody">
                    <div class="m-plan-tree-empty">等待探索开始...</div>
                </div>
            </div>
            <!-- 消息流（右） -->
            <div class="m-plan-content-panel" id="mPlanMessagePanel">
                <div class="m-plan-content-header">💬 探索过程</div>
                <div class="m-plan-message-body" id="mPlanMessageBody">
                    <div class="m-plan-message-empty">请点击左侧领域节点查看 AI 响应...</div>
                </div>
            </div>
        </div>

        <!-- 思考面板 -->
        <div class="m-plan-thinking-panel" id="mPlanThinkingPanel" style="display:none;">
            <div class="m-plan-thinking-header" id="mPlanThinkingHeader">
                <span class="m-plan-thinking-icon" id="mPlanThinkingIcon">🤔</span>
                <span class="m-plan-thinking-title" id="mPlanThinkingTitle">AI 思考中...</span>
                <button class="m-plan-thinking-toggle" id="mPlanThinkingToggle" style="display:none;">▼</button>
            </div>
            <div class="m-plan-thinking-body" id="mPlanThinkingBody">
                <div class="m-plan-thinking-content" id="mPlanThinkingContent"></div>
            </div>
        </div>

        <!-- 探索进度框 -->
        <div class="m-plan-progress-box" id="mPlanProgressBox" style="display:none;">
            <div class="m-plan-progress-header">
                <span class="m-plan-progress-icon" id="mPlanProgressIcon">⏳</span>
                <span class="m-plan-progress-title" id="mPlanProgressTitle">探索进度</span>
            </div>
            <div class="m-plan-progress-body" id="mPlanProgressBody">
                <span class="m-plan-progress-text" id="mPlanProgressText">准备中...</span>
            </div>
        </div>

        <!-- 结果展示 -->
        <div class="m-plan-result-section" id="mPlanResultSection" style="display:none;">
            <div class="m-plan-result-cards">
                <div class="m-plan-result-card">
                    <div class="m-plan-result-icon">📚</div>
                    <div class="m-plan-result-num" id="mResultAreas">0</div>
                    <div class="m-plan-result-label">总领域数</div>
                </div>
                <div class="m-plan-result-card">
                    <div class="m-plan-result-icon">💬</div>
                    <div class="m-plan-result-num" id="mResultMessages">0</div>
                    <div class="m-plan-result-label">总消息数</div>
                </div>
                <div class="m-plan-result-card">
                    <div class="m-plan-result-icon">📊</div>
                    <div class="m-plan-result-num" id="mResultDepth">0</div>
                    <div class="m-plan-result-label">最大深度</div>
                </div>
            </div>
            <div class="m-plan-result-actions">
                <button class="m-plan-restart-btn" id="mPlanRestartBtn">🔄 重新探索</button>
                <a href="/static/mobile/index.html" class="m-plan-view-tree-btn">🌲 查看领域树</a>
            </div>
        </div>

    </div>
</div>

<!-- ====== 登录模态框 ====== -->
<div class="m-plan-auth-overlay" id="mPlanAuthOverlay">
    <div class="m-plan-auth-card">
        <div class="m-plan-auth-logo"><img src="/static/images/logo_180.png" class="m-plan-auth-logo-img" alt="探知"></div>
        <h2 class="m-plan-auth-title">Plan Mode</h2>
        <p class="m-plan-auth-sub">深度学习规划需要先登录</p>
        <div class="m-plan-auth-tabs">
            <button class="m-plan-auth-tab active" id="mPlanTabLogin">登录</button>
            <button class="m-plan-auth-tab" id="mPlanTabRegister">注册</button>
        </div>
        <form id="mPlanAuthForm" onsubmit="return false;">
            <label class="m-plan-auth-label">用户名</label>
            <input type="text" class="m-plan-auth-input" id="mPlanAuthUsername" placeholder="输入用户名" autocomplete="username">
            <label class="m-plan-auth-label">密码</label>
            <input type="password" class="m-plan-auth-input" id="mPlanAuthPassword" placeholder="输入密码" autocomplete="current-password">
            <p class="m-plan-auth-error" id="mPlanAuthError"></p>
            <button type="submit" class="m-plan-auth-btn" id="mPlanAuthBtn">登录</button>
        </form>
    </div>
</div>

<!-- 本地库 -->
<script src="/static/js/lib/marked.min.js"></script>
<script src="/static/mobile/js/common.js"></script>
<script src="/static/mobile/js/plan.js"></script>
</body>
</html>
