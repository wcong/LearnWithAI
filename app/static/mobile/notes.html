<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>学习笔记 – 探知</title>
    <link href="/static/css/lib/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/mobile/css/style.css">
</head>
<body>

<!-- ====== 登录页 ====== -->
<div class="m-auth-page" id="mAuthPage">
    <div class="m-auth-card">
        <div class="m-auth-logo"><img src="/static/images/logo_180.png" class="m-auth-logo-img" alt="探知"></div>
        <h1>探知</h1>
        <p class="m-auth-sub">学习笔记</p>
        <div class="m-auth-tabs">
            <button class="m-auth-tab active" id="mTabLogin">登录</button>
            <button class="m-auth-tab" id="mTabRegister">注册</button>
        </div>
        <form id="mAuthForm" onsubmit="return false;">
            <label>邮箱</label>
            <input type="email" id="mAuthEmail" placeholder="输入邮箱" autocomplete="email">
            <label>密码</label>
            <input type="password" id="mAuthPassword" placeholder="输入密码" autocomplete="current-password">
            <div id="mAuthRegisterFields" style="display:none;">
                <div id="mAuthRegStep1">
                    <button type="submit" formnovalidate class="m-auth-btn" id="mAuthRegSendBtn" style="margin-bottom:10px;">发送验证码</button>
                </div>
                <div id="mAuthRegStep2" style="display:none;">
                    <label>验证码</label>
                    <input type="text" id="mAuthRegCode" placeholder="6 位数字验证码" maxlength="6">
                    <label>密码</label>
                    <input type="password" id="mAuthRegPassword" placeholder="至少 4 个字符">
                    <label>确认密码</label>
                    <input type="password" id="mAuthConfirmPassword" placeholder="再次输入密码">
                    <label>昵称（选填）</label>
                    <input type="text" id="mAuthNickname" placeholder="显示名称">
                </div>
            </div>
            <p class="m-auth-error" id="mAuthError"></p>
            <button type="submit" class="m-auth-btn" id="mAuthBtn">登录</button>
            <p class="m-auth-forgot-link" id="mAuthForgotLink" style="margin-top:10px;text-align:center;font-size:12px;color:#909399;cursor:pointer;">忘记密码？</p>
        </form>
        <div id="mAuthForgotPanel" style="display:none;">
            <p style="text-align:center;font-size:14px;color:#606266;margin-bottom:12px;">重置密码</p>
            <div id="mAuthForgotStep1">
                <label>邮箱</label>
                <input type="email" id="mAuthForgotEmail" placeholder="输入注册邮箱">
                <p class="m-auth-error" id="mAuthForgotError"></p>
                <button type="button" class="m-auth-btn" id="mAuthForgotSendBtn">发送验证码</button>
            </div>
            <div id="mAuthForgotStep2" style="display:none;">
                <label>验证码</label>
                <input type="text" id="mAuthForgotCode" placeholder="6 位数字验证码" maxlength="6">
                <label>新密码</label>
                <input type="password" id="mAuthForgotNewPassword" placeholder="至少 4 个字符">
                <p class="m-auth-error" id="mAuthForgotResetError"></p>
                <button type="button" class="m-auth-btn" id="mAuthForgotResetBtn">重置密码</button>
            </div>
            <p class="m-auth-forgot-link" id="mAuthForgotBack" style="margin-top:10px;text-align:center;font-size:12px;color:#409eff;cursor:pointer;">← 返回登录</p>
        </div>
    </div>
</div>

<!-- ====== 主应用 ====== -->
<div class="m-app-shell" id="mAppShell" style="display:none;">

    <!-- 顶栏（2 行布局） -->
    <header class="m-header" id="mHeader">
        <!-- Row 1: 页面导航 -->
        <div class="m-nav-row">
            <a href="/static/mobile/home.html" class="m-nav-logo" title="探知"><img src="/static/images/logo_180.png" class="m-nav-logo-img" alt="探知"></a>
            <nav class="m-page-nav">
                <a href="/static/mobile/index.html" class="m-page-link" data-page="domain" title="学习领域">📚</a>
                <a href="/static/mobile/notes.html" class="m-page-link active" data-page="notes" title="学习笔记">📝</a>
                <a href="/static/mobile/plan.html" class="m-page-link" data-page="plan" title="学习计划">💡</a>
                <a href="/static/skills.html" class="m-page-link" data-page="skills" title="技能管理">⚙️</a>
            </nav>
            <a href="/notes" class="m-nav-desktop" title="桌面版">🖥️</a>
        </div>
        <!-- Row 2: 当前页操作 -->
        <div class="m-action-row">
            <button class="m-action-btn" id="mBtnToggleAreas" title="领域列表">📁</button>
            <button class="m-action-btn" id="mBtnNewRoot" title="新建领域">➕</button>
            <span class="m-action-user" id="mUsernameBadge" style="display:none;"></span>
            <div class="m-action-group">
                <button class="m-action-btn" id="mBtnEditNote" style="display:none;" title="编辑">✏️</button>
                <button class="m-action-btn" id="mBtnSaveNote" style="display:none;" title="保存">💾</button>
                <button class="m-logout-btn" id="mBtnLogout" title="退出登录">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主面板：笔记 -->
    <div class="m-notes-main">
        <div class="m-notes-header">
            <div class="m-notes-header-text">
                <div class="m-notes-area-title" id="mNoteTitle">📝 学习笔记</div>
                <div class="m-notes-area-sub" id="mNoteAreaName">请选择左侧领域开始记录</div>
            </div>
            <span class="m-note-status" id="mNoteStatus"></span>
        </div>
        <div class="m-notes-editor-area">
            <div class="m-note-view" id="mNoteView"></div>
            <div class="m-note-editor" id="mNoteEditor" style="display:none;"></div>
        </div>
    </div>

    <!-- 遮罩层 -->
    <div class="m-overlay-mask" id="mOverlayMask"></div>

    <!-- 左侧覆盖层：领域树 -->
    <div class="m-side-overlay left" id="mAreaOverlay">
        <div class="m-overlay-header">
            <span class="m-overlay-title">📚 学习领域</span>
            <button class="m-overlay-close" id="mCloseAreaOverlay">✕</button>
        </div>
        <div class="m-overlay-body">
            <div class="m-area-scroll" id="mAreaTree">
                <div class="m-empty-state">加载中…</div>
            </div>
        </div>
    </div>
</div>

<!-- ====== 创建/编辑领域模态框 ====== -->
<div class="m-modal-overlay" id="mModalCreate">
    <div class="m-modal-header">
        <span class="m-modal-header-title" id="mModalCreateTitle">创建学习领域</span>
        <button class="m-modal-close" id="mModalCreateClose">✕</button>
    </div>
    <div class="m-modal-body">
        <div class="m-form-group">
            <label>领域名称 *</label>
            <input type="text" id="mCreateName" placeholder="例如：机器学习">
        </div>
        <div class="m-form-group">
            <label>简介（选填）</label>
            <textarea id="mCreateDesc" rows="3" placeholder="描述该领域的核心内容..."></textarea>
        </div>
        <input type="hidden" id="mCreateParentId" value="">
        <input type="hidden" id="mEditId" value="">
        <div class="m-form-actions">
            <button id="mCreateCancel">取消</button>
            <button class="m-btn-primary" id="mCreateSubmit">创建</button>
        </div>
    </div>
</div>

<!-- 本地库 -->
<script src="/static/js/lib/quill.js"></script>
<script src="/static/js/lib/marked.min.js"></script>
<script src="/static/mobile/js/common.js"></script>
<script src="/static/mobile/js/notes.js"></script>
</body>
</html>
